<!doctype html>
<html lang="ja">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <!-- Block: Document metadata -->
  <title>CocoroAI - OtomeKairo</title>
  <link rel="icon" href="/favicon.ico" type="image/x-icon" sizes="any" />
  <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon" />
  <link rel="stylesheet" href="/static/style.css" />
</head>

<body>
  <div class="app">
    <!-- Block: Header -->
    <header class="topbar">
      <div class="topbar-left">
        <div class="topbar-title">CocoroAI</div>
      </div>
      <div class="topbar-right">
        <button class="icon-btn" id="btn-settings" type="button" title="設定" aria-label="設定">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M19.14 12.94c.04-.31.06-.63.06-.94s-.02-.63-.06-.94l2.03-1.58a.5.5 0 0 0 .12-.64l-1.92-3.32a.5.5 0 0 0-.6-.22l-2.39.96a7.2 7.2 0 0 0-1.63-.94l-.36-2.54a.5.5 0 0 0-.5-.42h-3.84a.5.5 0 0 0-.5.42l-.36 2.54c-.58.22-1.12.52-1.63.94l-2.39-.96a.5.5 0 0 0-.6.22L2.7 7.8a.5.5 0 0 0 .12.64l2.03 1.58c-.04.31-.06.63-.06.94s.02.63.06.94L2.82 14.5a.5.5 0 0 0-.12.64l1.92 3.32c.13.22.39.3.6.22l2.39-.96c.5.41 1.05.72 1.63.94l.36 2.54c.05.24.26.42.5.42h3.84c.24 0 .45-.18.5-.42l.36-2.54c.58-.22 1.12-.52 1.63-.94l2.39.96c.22.08.47 0 .6-.22l1.92-3.32a.5.5 0 0 0-.12-.64l-2.03-1.56zM12 15.5A3.5 3.5 0 1 1 12 8a3.5 3.5 0 0 1 0 7.5z">
            </path>
          </svg>
        </button>
      </div>
    </header>

    <!-- Block: Main -->
    <main class="main">
      <section id="chat-panel" class="chat" aria-live="polite">
        <div id="chat-scroll" class="chat-scroll"></div>
      </section>

      <section id="settings-panel" class="settings hidden" aria-live="polite">
        <!-- Block: Settings window -->
        <div class="settings-window">
          <!-- Block: Settings header -->
          <div class="settings-window-header">
            <div>
              <div class="settings-window-title">設定</div>
              <div class="settings-window-subtitle">プリセット単位で編集し、保存時にまとめて反映します。</div>
            </div>
          </div>
          <!-- Block: Settings tabs -->
          <div class="settings-tabs" role="tablist" aria-label="設定タブ">
            <button class="settings-tab active" data-settings-tab="character" type="button">キャラクター</button>
            <button class="settings-tab" data-settings-tab="behavior" type="button">振る舞い</button>
            <button class="settings-tab" data-settings-tab="conversation" type="button">会話</button>
            <button class="settings-tab" data-settings-tab="memory" type="button">記憶</button>
            <button class="settings-tab" data-settings-tab="motion" type="button">モーション</button>
            <button class="settings-tab" data-settings-tab="system" type="button">システム</button>
          </div>

          <!-- Block: Settings content -->
          <div class="settings-body">
            <div class="settings-pages">
              <section class="settings-page" data-settings-page="character">
                <div id="settings-character-card" class="settings-card"></div>
              </section>

              <section class="settings-page hidden" data-settings-page="behavior">
                <div id="settings-behavior-card" class="settings-card"></div>
              </section>

              <section class="settings-page hidden" data-settings-page="conversation">
                <div id="settings-conversation-card" class="settings-card"></div>
              </section>

              <section class="settings-page hidden" data-settings-page="memory">
                <div id="settings-memory-card" class="settings-card"></div>
              </section>

              <section class="settings-page hidden" data-settings-page="motion">
                <div id="settings-motion-card" class="settings-card"></div>
              </section>

              <section class="settings-page hidden" data-settings-page="system">
                <div id="settings-system-card" class="settings-card"></div>
                <div id="settings-camera-card" class="settings-card"></div>
              </section>
            </div>
          </div>

          <!-- Block: Settings footer -->
          <div class="settings-footer">
            <div id="settings-status" class="settings-footer-status">保存済み</div>
            <div class="settings-footer-right">
              <button id="btn-settings-ok" class="settings-btn" type="button">OK</button>
              <button id="btn-settings-cancel" class="settings-btn" type="button">キャンセル</button>
              <button id="btn-settings-apply" class="settings-btn" type="button">適用</button>
            </div>
          </div>
        </div>
      </section>
    </main>

    <!-- Block: Input -->
    <form id="chat-form" class="composer" autocomplete="off">
      <div id="attachments" class="attachments" aria-label="添付ファイル一覧"></div>
      <div class="composer-row">
        <button class="composer-icon" id="btn-microphone" type="button" title="マイク" aria-label="マイク">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 15a3 3 0 0 0 3-3V7a3 3 0 1 0-6 0v5a3 3 0 0 0 3 3z"
              fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
            <path d="M19 11a7 7 0 0 1-14 0"
              fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
            <path d="M12 18v3" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
            <path d="M8 21h8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
          </svg>
        </button>

        <button class="composer-icon" id="btn-camera" type="button" title="カメラ" aria-label="カメラ">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 8a2 2 0 0 1 2-2h3l1.6-1.6h2.8L15 6h3a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V8z"
              fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
            <circle cx="12" cy="12.5" r="3.2" fill="none" stroke="currentColor" stroke-width="2"></circle>
          </svg>
        </button>

        <div class="composer-select-wrap">
          <label class="sr-only" for="camera-select">撮影するカメラ</label>
          <select id="camera-select" class="composer-select" aria-label="撮影するカメラ">
            <option value="">カメラを選択</option>
          </select>
        </div>

        <div class="composer-field">
          <label class="sr-only" for="chat-input">メッセージ入力</label>
          <textarea
            id="chat-input"
            class="composer-textarea"
            rows="1"
            maxlength="4000"
            placeholder="テキストを入力"
          ></textarea>
        </div>

        <button id="btn-cancel" class="composer-send secondary" type="button">停止</button>
        <button id="btn-send" class="composer-send" type="submit">送信</button>
      </div>
    </form>

    <!-- Block: Status bar -->
    <footer class="statusbar">
      <!-- Block: Status bar primary row -->
      <div class="statusbar-main">
        <div id="connection-text" class="statusbar-left">状態: 接続中...</div>
        <div id="runtime-text" class="statusbar-right">状態を確認中...</div>
      </div>
      <!-- Block: Status monitor -->
      <div class="statusbar-monitor">
        <div class="statusbar-monitor-row">
          <div class="statusbar-monitor-label">稼働</div>
          <div id="runtime-summary-text" class="statusbar-monitor-value">確認中...</div>
        </div>
      </div>
    </footer>
  </div>

  <!-- Block: Script -->
  <script src="/static/app.js"></script>
</body>

</html>
