<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Block: Document metadata -->
  <title>OtomeKairo</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="app-shell">
    <!-- Block: Top bar -->
    <header class="topbar">
      <div class="topbar-title">OtomeKairo</div>
      <div class="topbar-actions">
        <button id="btn-mic" class="icon-button" type="button" aria-label="音声入力">Mic</button>
        <button id="btn-camera" class="icon-button" type="button" aria-label="カメラ">Cam</button>
        <button id="btn-settings" class="icon-button" type="button" aria-label="設定">設定</button>
      </div>
    </header>

    <!-- Block: Status strip -->
    <section class="status-strip" aria-live="polite">
      <div id="connection-text" class="status-chip">接続中...</div>
      <div id="runtime-text" class="status-chip secondary">状態を確認中...</div>
    </section>

    <!-- Block: Main panels -->
    <main class="main-layout">
      <section id="chat-panel" class="chat-panel" aria-live="polite">
        <div id="chat-scroll" class="chat-scroll"></div>
      </section>

      <aside id="settings-panel" class="settings-panel hidden">
        <!-- Block: Settings header -->
        <div class="settings-header">
          <div class="settings-title">設定</div>
          <div class="settings-actions">
            <button id="btn-settings-reload" class="panel-button" type="button">再読込</button>
            <button id="btn-settings-save" class="panel-button primary" type="button">保存</button>
            <button id="btn-settings-close" class="panel-button" type="button">閉じる</button>
          </div>
        </div>

        <!-- Block: Settings note -->
        <div class="settings-note">
          この画面は初期実装です。設定保存 UI はまだダミーで、現状確認のみ行います。
        </div>

        <!-- Block: Status snapshot -->
        <section class="settings-section">
          <div class="section-title">現在状態</div>
          <pre id="status-json" class="json-view">{}</pre>
        </section>

        <!-- Block: Settings snapshot -->
        <section class="settings-section">
          <div class="section-title">有効設定</div>
          <pre id="settings-json" class="json-view">{}</pre>
        </section>
      </aside>
    </main>

    <!-- Block: Composer -->
    <form id="chat-form" class="composer" autocomplete="off">
      <label class="composer-input-wrap" for="chat-input">
        <span class="sr-only">メッセージ入力</span>
        <input
          id="chat-input"
          class="composer-input"
          type="text"
          name="text"
          maxlength="4000"
          placeholder="メッセージを入力"
        />
      </label>
      <button id="btn-cancel" class="composer-button secondary" type="button">停止</button>
      <button id="btn-send" class="composer-button primary" type="submit">送信</button>
    </form>
  </div>

  <!-- Block: Script -->
  <script src="/static/app.js"></script>
</body>
</html>
